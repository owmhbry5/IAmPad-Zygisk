name: Build IAmPad-Zygisk

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Build native library
        run: |
          chmod +x build.sh
          ./build.sh "$NDK_HOME"

      - name: Package Magisk module
        run: |
          mkdir -p module_template/zygisk
          cp -f module.prop module_template/
          cp -f customize.sh module_template/
          cp -f service.sh module_template/
          cp -f read_log.sh module_template/
          cp -f config.conf module_template/
          # ZygiskNext naming: <abi>.so (NOT zygisk-<id>.so)
          cp -f out/lib/arm64-v8a/libiampad.so module_template/zygisk/arm64-v8a.so
          cp -f out/lib/armeabi-v7a/libiampad.so module_template/zygisk/armeabi-v7a.so
          cp -f out/lib/x86/libiampad.so module_template/zygisk/x86.so
          cp -f out/lib/x86_64/libiampad.so module_template/zygisk/x86_64.so
          cd module_template
          zip -r9 ../IAmPad-Zygisk.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IAmPad-Zygisk
          path: IAmPad-Zygisk.zip

      - name: Upload release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: IAmPad-Zygisk.zip
